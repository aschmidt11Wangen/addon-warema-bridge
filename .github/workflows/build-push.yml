name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'warema-bridge/**'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from config.json
        id: version
        run: echo "version=$(jq -r .version warema-bridge/config.json)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: warema-bridge
          file: warema-bridge/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/aschmidt11wangen/addon-warema-bridge:${{ steps.version.outputs.version }}
            ghcr.io/aschmidt11wangen/addon-warema-bridge:latest
